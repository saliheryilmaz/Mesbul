<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — MesBul</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --navy:       #0F172A;
    --slate-50:   #F8FAFC;
    --slate-100:  #F1F5F9;
    --slate-200:  #E2E8F0;
    --slate-300:  #CBD5E1;
    --slate-400:  #94A3B8;
    --slate-600:  #475569;
    --slate-700:  #334155;
    --slate-900:  #0F172A;
    --white:      #FFFFFF;
    --orange:     #E85D26;
    --orange-dark:#C94D1A;
    --red:        #EF4444;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--slate-50);
    color: var(--slate-900);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .wrapper { width: 100%; max-width: 420px; }

  /* Logo */
  .logo-area {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.625rem;
    background: var(--navy);
    border: 1px solid rgba(15,23,42,.1);
    border-radius: 32px;
    padding: 0.625rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .logo-badge svg {
    width: 20px;
    height: 20px;
    color: var(--white);
  }
  .logo-text {
    color: var(--white);
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .logo-subtitle {
    font-size: 0.875rem;
    color: var(--slate-600);
    font-weight: 400;
  }

  /* Card */
  .card {
    background: var(--white);
    border: 1px solid var(--slate-200);
    border-radius: 8px;
    padding: 2.5rem 2rem;
    box-shadow: 0 1px 3px rgba(15,23,42,.08);
  }

  .card-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--slate-900);
    margin-bottom: 1.75rem;
    letter-spacing: -0.02em;
  }

  /* Error */
  .error {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 6px;
    padding: 0.875rem 1rem;
    color: var(--red);
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
  }

  /* Form */
  .field {
    margin-bottom: 1.5rem;
  }
  .field-label {
    display: block;
    font-size: 0.625rem;
    font-weight: 600;
    color: var(--slate-600);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }
  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 0.875rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--slate-400);
    font-size: 0.875rem;
    pointer-events: none;
  }
  .field-input {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--slate-200);
    border-radius: 6px;
    padding: 0.75rem 0.875rem 0.75rem 2.5rem;
    color: var(--slate-900);
    font-family: 'Inter', sans-serif;
    font-size: 0.9375rem;
    font-weight: 500;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,93,38,.1);
  }
  .field-input::placeholder {
    color: var(--slate-400);
    font-weight: 400;
  }

  /* Toggle password */
  .toggle-password {
    position: absolute;
    right: 0.875rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--slate-400);
    font-size: 0.875rem;
    padding: 0;
    line-height: 1;
    transition: color .2s;
  }
  .toggle-password:hover {
    color: var(--slate-600);
  }

  /* Button */
  .btn-primary {
    width: 100%;
    background: var(--orange);
    border: none;
    border-radius: 6px;
    padding: 0.875rem 1.5rem;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: 0.5rem;
  }
  .btn-primary:hover {
    background: var(--orange-dark);
  }
  .btn-primary:active {
    transform: translateY(1px);
  }

  /* Footer */
  .footer-note {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.8125rem;
    color: var(--slate-600);
  }
  .security-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--slate-400);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="wrapper">

  <div class="logo-area">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <span class="logo-text">MesBul</span>
    </div>
    <p class="logo-subtitle">Toptancı fiyat karşılaştırma sistemi</p>
  </div>

  <div class="card">
    <h2 class="card-title">Hesabınıza giriş yapın</h2>

    {% if hata %}
      <div class="error">
        <span>⚠️</span>
        <span>{{ hata }}</span>
      </div>
    {% endif %}

    <form method="POST" action="{% url 'giris' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}

      <div class="field">
        <label class="field-label">Kullanıcı Adı</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            type="text"
            name="kullanici_adi"
            class="field-input"
            placeholder="kullanici_adi"
            autocomplete="username"
            autofocus
            required
          >
        </div>
      </div>

      <div class="field">
        <label class="field-label">Şifre</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            name="sifre"
            id="sifre-input"
            class="field-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-password" onclick="toggleSifre()" title="Şifreyi göster/gizle">
            <span id="goz-ikon">👁️</span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary">Giriş Yap</button>
    </form>
  </div>

  <div class="footer-note">
    Hesabınız yok mu? Yöneticinizle iletişime geçin.
  </div>

  <div class="security-note">
    🔐 Güvenli bağlantı · Yetkisiz erişim yasaktır
  </div>

</div>

<script>
function toggleSifre() {
  const input = document.getElementById('sifre-input');
  const ikon  = document.getElementById('goz-ikon');
  if (input.type === 'password') {
    input.type = 'text';
    ikon.textContent = '🙈';
  } else {
    input.type = 'password';
    ikon.textContent = '👁️';
  }
}
</script>

</body>
</html>
