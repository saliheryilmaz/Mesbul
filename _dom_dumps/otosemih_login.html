<body>
    <div class="auth-page-wrapper auth-bg-cover py-5 d-flex justify-content-center align-items-center min-vh-100">
        <div class="bg-overlay"></div>
        <div class="auth-page-content overflow-hidden pt-lg-5">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="card overflow-hidden border-0">
                            <div class="row g-0">
                                <div class="col-lg-6">
                                    <div class="p-lg-5 p-4 auth-one-bg h-100">
                                        <div class="bg-overlay"></div>
                                        <div class="position-relative h-100 d-flex flex-column">
                                            <div class="mb-4">
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-lg-6">
                                    <div class="p-lg-5 p-4">
                                        <div>
                                            <h5 class="text-primary">Hosgeldiniz!</h5>
                                            <p class="text-muted">Sisteme giris yapin.</p>
                                        </div>

                                        <div class="mt-4">
                                            <form class="row g-3 needs-validation" novalidate="" onsubmit="return loginSubmit(event);">

                                                <div class="mb-3">
                                                    <label for="username" class="form-label">Kullanici Adi</label>
                                                    <input type="text" class="form-control" name="username" id="username" placeholder="Kullanici Adi">
                                                </div>

                                                <div class="mb-3">
                                                    <div class="float-end d-none">
                                                        <a href="/sifremi-unuttum" class="text-muted">Sifrenizi mi unuttunuz?</a>
                                                    </div>
                                                    <label class="form-label" for="password-input">Sifre</label>
                                                    <div class="position-relative auth-pass-inputgroup mb-3">
                                                        <input type="password" name="password" class="form-control pe-5 password-input" placeholder="Sifre" id="password-input">
                                                        <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted password-addon" type="button" id="password-addon"><i class="ri-eye-fill align-middle"></i></button>
                                                    </div>
                                                </div>

                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" value="" id="remember-check" checked="">
                                                    <label class="form-check-label text-left" style="float:left" for="remember-check">Beni Hatirla</label>
                                                </div>

                                                <div class="mt-4">
                                                    <input name="command" value="login" type="hidden">
                                                    <button class="btn btn-success w-100" type="submit">Giris Yap</button>
                                                </div>

                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer class="footer">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="text-center">
                            <p class="mb-0">© 2025 Oto Semih</p>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="/assets/js/jquery.min.js?v=02018"></script>
    <script src="/assets/libs/bootstrap/js/bootstrap.bundle.min.js?v=02018"></script>
    <script src="/assets/libs/simplebar/simplebar.min.js?v=02018"></script>
    <script src="/assets/libs/node-waves/waves.min.js?v=02018"></script>
    <script src="/assets/libs/feather-icons/feather.min.js?v=02018"></script>
    <script src="/assets/js/pages/plugins/lord-icon-2.1.0.js?v=02018"></script>
    <script src="/assets/js/plugins.js?v=02018"></script><script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script type="text/javascript" src="/assets/libs/choices.js/public/assets/scripts/choices.min.js"></script>
<script type="text/javascript" src="/assets/libs/flatpickr/flatpickr.min.js"></script>

    <script src="/assets/libs/sweetalert2/sweetalert2.min.js?v=02018"></script>

    <script>
    function loginSubmit(event) {
        event.preventDefault();

        var username = document.getElementById('username').value;
        var password = document.getElementById('password-input').value;
        var rememberMe = document.getElementById('remember-check').checked;

        if (!username || !password) {
            Swal.fire({
                title: "Hata!",
                text: "Kullanici adi ve sifre gerekli.",
                icon: "error",
                confirmButtonClass: "btn btn-primary w-xs mt-2",
                buttonsStyling: false
            });
            return false;
        }

        fetch('/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: username,
                password: password,
                rememberMe: rememberMe
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'Success') {
                window.location.href = '/';
            } else {
                Swal.fire({
                    title: "Hata!",
                    text: data.Message || "Hatali E-Mail veya Sifre",
                    icon: "error",
                    confirmButtonClass: "btn btn-primary w-xs mt-2",
                    buttonsStyling: false
                });
            }
        })
        .catch(error => {
            Swal.fire({
                title: "Hata!",
                text: "Bir hata olustu.",
                icon: "error",
                confirmButtonClass: "btn btn-primary w-xs mt-2",
                buttonsStyling: false
            });
        });

        return false;
    }

    // Password toggle
    document.getElementById('password-addon').addEventListener('click', function() {
        var passwordInput = document.getElementById('password-input');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
        } else {
            passwordInput.type = 'password';
        }
    });
    </script>
