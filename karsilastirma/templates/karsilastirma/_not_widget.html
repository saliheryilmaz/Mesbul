{% if request.user.is_authenticated %}
{% load static %}

<!-- ========== NOT BUTONU (sabit sağ alt) ========== -->
<button id="not-fab" onclick="notPanelAc()" title="Notlarım" aria-label="Notlarım">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>
  <span id="not-badge" style="display:none">0</span>
</button>

<!-- ========== NOT PANEL ========== -->
<div id="not-overlay" onclick="notPanelKapat()" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:998"></div>

<div id="not-panel" style="display:none;position:fixed;right:0;top:0;bottom:0;width:380px;max-width:95vw;background:#fff;box-shadow:-4px 0 32px rgba(15,23,42,.18);z-index:999;flex-direction:column;border-left:1px solid #E2E8F0">

  <!-- Panel başlık -->
  <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#FAFAFA">
    <div>
      <div style="font-size:1rem;font-weight:700;color:#0F172A;letter-spacing:-.02em">📋 Notlarım</div>
      <div style="font-size:.75rem;color:#94A3B8;font-weight:500;margin-top:2px">Notlar 7 gün sonra otomatik silinir</div>
    </div>
    <button onclick="notPanelKapat()" style="background:none;border:none;cursor:pointer;color:#94A3B8;padding:.25rem;border-radius:6px;transition:all .2s;display:flex;align-items:center;justify-content:center" onmouseover="this.style.background='#F1F5F9';this.style.color='#475569'" onmouseout="this.style.background='none';this.style.color='#94A3B8'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Not ekle formu -->
  <div style="padding:1rem 1.5rem;border-bottom:1px solid #E2E8F0;flex-shrink:0;background:#fff">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem">
      <input id="not-ebat" type="text" placeholder="Ebat (205/55R16)" value="{{ ebat|default:'' }}"
        style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:.5rem .75rem;font-size:.8125rem;font-family:'JetBrains Mono',monospace;font-weight:600;color:#0F172A;outline:none;transition:border-color .2s"
        onfocus="this.style.borderColor='#E85D26';this.style.boxShadow='0 0 0 3px rgba(232,93,38,.1)'"
        onblur="this.style.borderColor='#E2E8F0';this.style.boxShadow='none'">
      <input id="not-marka" type="text" placeholder="Marka (opsiyonel)" value="{{ marka|default:'' }}"
        style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:.5rem .75rem;font-size:.8125rem;color:#0F172A;outline:none;transition:border-color .2s"
        onfocus="this.style.borderColor='#E85D26';this.style.boxShadow='0 0 0 3px rgba(232,93,38,.1)'"
        onblur="this.style.borderColor='#E2E8F0';this.style.boxShadow='none'">
    </div>
    <div style="display:flex;gap:.5rem;align-items:flex-start">
      <textarea id="not-icerik" placeholder="Müşteriye verilen fiyat, müşteri adı, not..." rows="2"
        style="flex:1;resize:none;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:.5rem .75rem;font-size:.875rem;color:#0F172A;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;line-height:1.5"
        onfocus="this.style.borderColor='#E85D26';this.style.boxShadow='0 0 0 3px rgba(232,93,38,.1)'"
        onblur="this.style.borderColor='#E2E8F0';this.style.boxShadow='none'"></textarea>
      <button onclick="notEkle()" title="Not ekle"
        style="background:#E85D26;border:none;border-radius:6px;padding:.5rem .75rem;color:#fff;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;height:40px"
        onmouseover="this.style.background='#C94D1A'" onmouseout="this.style.background='#E85D26'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="not-hata" style="display:none;color:#EF4444;font-size:.75rem;margin-top:.375rem;font-weight:500"></div>
  </div>

  <!-- Not listesi -->
  <div id="not-liste" style="flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:.75rem">
    <div id="not-yukleniyor" style="text-align:center;color:#94A3B8;font-size:.875rem;padding:2rem 0">Yükleniyor...</div>
  </div>

</div>

<style>
#not-fab {
  position: fixed;
  right: 1.5rem;
  bottom: 1.5rem;
  z-index: 990;
  background: #E85D26;
  color: #fff;
  border: none;
  border-radius: 50px;
  width: 54px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(232,93,38,.45);
  transition: transform .2s, box-shadow .2s, background .2s;
  position: fixed;
}
#not-fab:hover {
  background: #C94D1A;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(232,93,38,.55);
}
#not-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: #EF4444;
  color: #fff;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: .6875rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #fff;
  font-family: 'Inter', sans-serif;
}
.not-kart {
  background: #FFFBEB;
  border: 1px solid #FDE68A;
  border-radius: 8px;
  padding: .875rem 1rem;
  position: relative;
}
.not-kart-ebat {
  font-family: 'JetBrains Mono', monospace;
  font-size: .75rem;
  font-weight: 700;
  color: #92400E;
  background: #FEF3C7;
  border: 1px solid #FDE68A;
  border-radius: 4px;
  padding: .125rem .5rem;
  display: inline-block;
  margin-bottom: .5rem;
}
.not-kart-icerik {
  font-size: .875rem;
  color: #1C1917;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.not-kart-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: .625rem;
  padding-top: .5rem;
  border-top: 1px solid #FDE68A;
}
.not-kart-tarih {
  font-size: .6875rem;
  color: #A16207;
  font-weight: 500;
}
.not-kart-kalan {
  font-size: .6875rem;
  color: #A16207;
  font-weight: 600;
}
.not-sil-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #D97706;
  padding: .25rem;
  border-radius: 4px;
  transition: color .2s, background .2s;
  display: flex;
  align-items: center;
}
.not-sil-btn:hover {
  color: #EF4444;
  background: #FEE2E2;
}
</style>

<script>
const NOT_API       = "/notlar/";
const NOT_EKLE_API  = "/notlar/ekle/";
const NOT_SIL_API   = "/notlar/{id}/sil/";
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';

function notPanelAc() {
  document.getElementById('not-overlay').style.display = 'block';
  document.getElementById('not-panel').style.display = 'flex';
  notlariYukle();
}
function notPanelKapat() {
  document.getElementById('not-overlay').style.display = 'none';
  document.getElementById('not-panel').style.display = 'none';
}

async function notlariYukle() {
  const liste = document.getElementById('not-liste');
  liste.innerHTML = '<div style="text-align:center;color:#94A3B8;font-size:.875rem;padding:2rem 0">Yükleniyor...</div>';
  try {
    const r = await fetch(NOT_API);
    const d = await r.json();
    notlariRender(d.notlar);
  } catch(e) {
    liste.innerHTML = '<div style="text-align:center;color:#EF4444;font-size:.875rem;padding:2rem 0">Yüklenemedi.</div>';
  }
}

function notlariRender(notlar) {
  const liste = document.getElementById('not-liste');
  const badge = document.getElementById('not-badge');

  // Badge güncelle
  if (notlar.length > 0) {
    badge.textContent = notlar.length;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }

  if (notlar.length === 0) {
    liste.innerHTML = `
      <div style="text-align:center;padding:3rem 1rem;color:#94A3B8">
        <div style="font-size:2.5rem;margin-bottom:.75rem">📝</div>
        <div style="font-size:.9375rem;font-weight:600;color:#475569;margin-bottom:.375rem">Henüz not yok</div>
        <div style="font-size:.8125rem">Yukarıdan fiyat notlarınızı ekleyin</div>
      </div>`;
    return;
  }

  liste.innerHTML = notlar.map(n => `
    <div class="not-kart" id="not-${n.id}">
      ${n.ebat ? `<div class="not-kart-ebat">${n.ebat}${n.marka ? ' · '+n.marka : ''}</div>` : ''}
      <div class="not-kart-icerik">${escHtml(n.icerik)}</div>
      <div class="not-kart-meta">
        <div>
          <div class="not-kart-tarih">🕐 ${n.tarih}</div>
          <div class="not-kart-kalan">${n.kalan_gun === 0 ? '⚠️ Bugün siliniyor' : '⏳ '+n.kalan_gun+' gün kaldı'}</div>
        </div>
        <button class="not-sil-btn" onclick="notSil(${n.id})" title="Notu sil">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function notEkle() {
  const icerik = document.getElementById('not-icerik').value.trim();
  const ebat   = document.getElementById('not-ebat').value.trim();
  const marka  = document.getElementById('not-marka').value.trim();
  const hataEl = document.getElementById('not-hata');

  if (!icerik) {
    hataEl.textContent = 'Not içeriği boş olamaz.';
    hataEl.style.display = 'block';
    return;
  }
  hataEl.style.display = 'none';

  try {
    const r = await fetch(NOT_EKLE_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken':CSRF},
      body: JSON.stringify({icerik, ebat, marka})
    });
    if (!r.ok) throw new Error();
    document.getElementById('not-icerik').value = '';
    notlariYukle();
  } catch(e) {
    hataEl.textContent = 'Bir hata oluştu.';
    hataEl.style.display = 'block';
  }
}

async function notSil(id) {
  try {
    await fetch(NOT_SIL_API.replace('{id}', id), {
      method: 'DELETE',
      headers: {'X-CSRFToken': CSRF}
    });
    notlariYukle();
  } catch(e) {}
}

// Enter ile not ekle (Shift+Enter yeni satır)
document.addEventListener('DOMContentLoaded', function() {
  const ta = document.getElementById('not-icerik');
  if (ta) {
    ta.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        notEkle();
      }
    });
  }
  // Sayfa yüklenince badge'i güncelle
  fetch(NOT_API).then(r => r.json()).then(d => {
    const badge = document.getElementById('not-badge');
    if (d.notlar && d.notlar.length > 0) {
      badge.textContent = d.notlar.length;
      badge.style.display = 'flex';
    }
  }).catch(()=>{});
});
</script>
{% endif %}
